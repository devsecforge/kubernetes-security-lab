name: K8s Security

# Validates and security-scans Kubernetes manifests on every change.
# Design note: this repo intentionally contains an INSECURE manifest for training, so
# kube-linter/Trivy run in REPORT mode. kubeconform (schema validity) is the blocking gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  validate:
    name: Schema validation (kubeconform)   # blocking gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        run: |
          curl -sSLo kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform.tar.gz && sudo mv kubeconform /usr/local/bin/
      - name: Validate manifests
        run: kubeconform -strict -summary -ignore-missing-schemas manifests/

  kube-linter:
    name: Security lint (kube-linter, report)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: kube-linter scan
        continue-on-error: true   # insecure sample is expected to flag; report, don't fail
        uses: stackrox/kube-linter-action@v1
        with:
          directory: manifests
          config: .kube-linter.yaml

  trivy-config:
    name: Misconfig scan (Trivy, report)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          curl -sfL https://github.com/aquasecurity/trivy/releases/download/v0.72.0/trivy_0.72.0_Linux-64bit.tar.gz -o trivy.tar.gz
          tar xzf trivy.tar.gz trivy
          sudo mv trivy /usr/local/bin/ && trivy --version
      - name: Trivy config scan (report)
        run: trivy config --severity HIGH,CRITICAL --format sarif --output trivy-k8s.sarif manifests/ || true
      - name: Upload SARIF
        if: github.event_name == 'push'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-k8s.sarif
