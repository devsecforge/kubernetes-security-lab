# Least-privilege RBAC: a dedicated ServiceAccount bound to a Role that grants
# only read access to its own ConfigMaps — nothing cluster-wide, no secrets, no exec.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: web-sa
  namespace: secure-demo
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: web-configmap-reader
  namespace: secure-demo
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: web-configmap-reader-binding
  namespace: secure-demo
subjects:
  - kind: ServiceAccount
    name: web-sa
    namespace: secure-demo
roleRef:
  kind: Role
  name: web-configmap-reader
  apiGroup: rbac.authorization.k8s.io
